	<script src="js/background.js"></script>
	<script src="js/github.js"></script>
	<script>
		// https://apps.timwhitlock.info/emoji/tables/unicode
		// https://www.unicode.org/Public/UNIDATA/EmojiSources.txt
		const emoticonStart = '1F601';
		const emoticonEnd = '1F64F'
		const getRandomEmoji = () => {
			const start = parseInt(emoticonStart, 16);
			const end = parseInt(emoticonEnd, 16);

			return String.fromCodePoint(Math.floor(Math.random() * (end - start + 1)) + start);
		}

		const emojiContainer = document.getElementById('emoji-container');
		emojiContainer.textContent = getRandomEmoji();
		
		twemoji.parse(emojiContainer);

		const interval = setInterval(() => {
			emojiContainer.textContent = getRandomEmoji();
			
			twemoji.parse(emojiContainer);
		}, 2000);
		fetchProjects();
	</script>
