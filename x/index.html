		<style>
			body {
				display: flex;
				justify-content: center;
				align-items: center;
				position: relative;
				height: 100vh;
			}

			a {
				color: black;
			}

			.main {
				display: flex;
				align-items: end;
				gap: 1em;
			}

			#contact {
				height: fit-content;
				padding-top: 1em;
				padding-left: 1em;
				display: flex;
				flex-direction: column;
				gap: 1em;
				position: absolute;
				top: 0;
				left: 0;
			}

			#skull {
				position: relative;
			}

			#skull p {
				position: absolute;
				top: 30%;
				left: 5%;
				padding-top: 0.5em;
				padding-bottom: 0.5em;
				padding-left: 0.1em;
				padding-right: 0.1em;
				background-color: black;
				width: 40%;
				color: white;
				font-weight: bolder;
				font-size: 22px;
				animation: noThoughts 3s infinite steps(1);
			}

			@keyframes noThoughts {
				0% {
					font-family: sans-serif;
				}
				33% {
					font-family: monospace;
					font-style: italic;
				}
				66% {
					font-family: monospace;
					font-style: normal;
					text-decoration: underline;
				}
			}

			#skull img {
				width: 100%;
				height: 100%;
				filter: invert(100%);
			}

			.section p {
				font-family: 'Monomaniac One', sans-serif;
				font-size: 22px;
			}

			#paws {
				position: absolute;
				bottom: 0;
				filter: invert(100%);
				right: 0;
				z-index: -1;
				mix-blend-mode: color;
			}

			@media (max-width: 768px) {
				.main {
					height: 100%;
					flex-direction: column;
					align-items: center;
				}

				.section {
					width: 90%;
				}

				#contact {
					padding: 0;
					top: unset;
					bottom: 0;
					flex-direction: row;
					font-size: 12px;
				}
				#paws {
					opacity: 0.1;
				}
			}
		</style>
	</body>
